<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!--start css links-->
 <link rel="stylesheet" href="./icons/all.css">
    <link rel="stylesheet" href="./login/css/login.css">
    <link rel="stylesheet" href="./login/css/responsive.css">
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./login/css/animate.min.css">
 <!--end css links-->
    <script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
    <title>Login</title>
</head>
<body>
  <div class="container main-box ">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a href="#" class="navbar-brand">
          <img src="./assests/logo.png" alt="">
        </a>
        <button class="navbar-toggler  shadow-none border-0" type="button" data-bs-toggle="collapse" data-bs-target="#myNavbar">
          <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="myNavbar">
          <div class="navbar-nav text-center w-100 justify-content-end">
            <a href="./student-login/login.html" class="nav-link">Student Login</a>
            <a href="./ABOUT US/about.html" class="nav-link">About</a>
            <a href="./contactus/contact.html" class="nav-link">Contact</a>
            <button class="main-btn" id="signup-btn">Sign-Up</button>
             <button class="main-btn d-none" id="signin-btn">Sign-in</button>
           </div>
        </div>
      </div>
    </nav>

    <!--creating a form-->

       <div class="row">
        <div class="col-md-12 col-lg-6 second">
            <div class="login-box active">
              <h1>Welcome</h1>
              <form>
                <label for="id">ID</label>
                <input type="text" required id="id" class="form-control mb-4 mt-2">
                <label for="username" >UserName</label>
                <input type="text" required id="username" class="form-control mb-4 mt-2">
                <label for="password" >Password</label>
                <input type="password" required id="password" class="form-control mb-4 mt-2">
                <div class="link">
                  <a href="./student-login/login.html">Student Login Form</a>
                </div>
                <button class="btn mt-4" id="signin">Sign In</button>
              </form>
            </div>

            <div class="signup-box">
              <form class="signup-form">
                <label for="id">ID</label>
                <input type="text" required id="s-id" class="form-control mb-4 mt-2">
                 <label for="name">Name</label>
                <input type="text" required id="name" class="form-control mb-4 mt-2">
                <label for="contact">Contact</label>
                <input type="text" required id="contact" class="form-control mb-4 mt-2">
                <label for="adress">Adress</label>
                <textarea name=""  required id="adress" class="form-control mb-4"></textarea>
                <label for="s-username">UserName</label>
                <input type="text" required id="s-username"  class="form-control mb-4 mt-2">
                <label for="s-password">Password</label>
                <input type="password" required id="s-password" class="form-control mb-4 mt-2">
                <button class="btn mt-4">Sign Up</button>
              </form>
            </div>

        </div>

        <div class="col-md-12 col-lg-6 ping">
        <img src="./assests/login.gif" class="w-100 img-fluid" >
        </div>
       </div>

    <!--ending a form-->
    </div>
      
    <script src="./login/js/gsap.min.js"></script>
    <script src="./login/js/login.js"></script>
    <script src="./login/js/sweetalert.min.js"></script>
</body>
</html>
