<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!--start css links-->
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/login.css">
    <!--end css links-->
    <!--start js links-->
    <script src="../bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../bootstrap/js/sweetalert.min.js"></script>
    <!--end js links-->
</head>
<body>
    <div class="container main mt-5">
        <h1 class="text-white text-center fw-bold mb-4">Wellcome to Login Form </h1>
        <div class="row second">
            <div class="col-md-6 first">
            <img src="./assets/ed.gif" class="w-100">
        </div>
        <div class="col-md-6 second  mt-5">
           <form class="login-form">
             <h1 class="text-white text-center mb-5">Fill Requirments</h1>
             <div class="input-group mb-5">
                <span class="input-group-text">Choose Space Code</span>
                <select name="" id="brand-code-el" class="dani shadow-none form-control">
                    <option value="choose space code">Choose Space Code</option>
                </select>
             </div>
            <div class="input-group">
                <span class="input-group-text">Enrollment</span>
                <input type="text" placeholder="Enter your Enrollment"  class="shadow-none form-control">
            </div>
             <div class="input-group mt-5">
                <span class="input-group-text">Password</span>
                <input type="text"  placeholder="Enter your Password" class="form-control shadow-none">
            </div>
            <button class="shadow-none  btn w-100 mt-5 mb-5">Login</button>
           </form>
        </div>
        </div>
    </div>

    <script src="../login/js/gsap.min.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
